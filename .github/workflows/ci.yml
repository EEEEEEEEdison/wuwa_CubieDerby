name: CI

on:
  push:
    branches: [main, "review/**", "codex/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest]
        include:
          # Smoke-test on Windows for the latest Python only — the project
          # is developed on Windows but most contributors run Linux.
          - python-version: "3.12"
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show environment
        shell: bash
        run: |
          python --version
          python -c "import sys; print(sys.version)"

      - name: Run unittest suite
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
        run: python -m unittest discover -s tests -v

      - name: Embedded smoke-test (pinned regression battery)
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
        run: python cubie_derby.py --smoke-test
